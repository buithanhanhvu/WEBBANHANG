spring.application.name=Webbanhang
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/webbanhang?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Bangkok}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

app.jwt.secret=change-this-local-secret-for-webbanhang
app.jwt.expiration-minutes=720

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads
