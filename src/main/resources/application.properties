spring.application.name=Webbanhang
server.port=8080

# Database Configuration (Environment-driven for Security)
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/webbanhang?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Bangkok}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Security & JWT Configuration (Environment Variable Override in Production)
app.jwt.secret=${JWT_SECRET:W3bbAnH4ng-S3cur1ty-K3y-D0-N0t-Us3-1n-Pr0duct10n-Ch4ng3-Th1s-V4lu3-2026-R4nd0m-P4dd1ng}
app.jwt.expiration-minutes=720

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads

# Static Resource Configuration
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# Google OAuth2 Credentials (Environment-driven)
app.google.client-id=${GOOGLE_CLIENT_ID:1071806914161-7tjfbvs26pk1n47t89lr14q201djorre.apps.googleusercontent.com}

# VNPAY Gateway Sandbox Configuration (Environment-driven)
vnpay.tmn-code=${VNPAY_TMN_CODE:J6EAJ1UJ}
vnpay.hash-secret=${VNPAY_HASH_SECRET:5RTYHWM6X0C55SAQNK0P9E8GI427QV9C}
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=${APP_BASE_URL:http://localhost:8080}/api/payment/vnpay-return
vnpay.ipn-url=${APP_BASE_URL:http://localhost:8080}/api/payment/vnpay-ipn

# Flyway Migration Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false
spring.jpa.hibernate.ddl-auto=none

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.webbanhang=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.file.name=logs/app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
